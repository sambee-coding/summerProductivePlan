<!DOCTYPE html>
<html lang="en">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #040f16; /* Deep sea blue base */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-card {
            background: rgba(10, 25, 47, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(45, 212, 191, 0.15); /* Soft aqua border */
        }
        .glow-aqua:checked {
            filter: drop-shadow(0 0 8px #2dd4bf);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2dd4bf;
            border-radius: 10px;
        }
    </style>
</head>

                            <div class="flex flex-col sm:flex-row gap-2 border-b border-blue-900/50 pb-2">
                                <div class="w-24 text-sky-400 font-bold text-xs uppercase tracking-wider">Morning</div>
                                <div class="flex-1 text-sm text-cyan-100/90 space-y-2">
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-0" onchange="saveDailyScheduleState(0)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">6:30–7:00: Prayer & Reflection</span></label>
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-1" onchange="saveDailyScheduleState(1)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">7:00–7:45: Workout</span></label>
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-2" onchange="saveDailyScheduleState(2)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">7:45–8:15: Breakfast</span></label>
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-3" onchange="saveDailyScheduleState(3)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">8:15–8:45: Reading</span></label>
                                </div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-2 border-b border-blue-900/50 pb-2">
                                <div class="w-24 text-sky-400 font-bold text-xs uppercase tracking-wider">Deep Work 1</div>
                                <div class="flex-1 text-sm text-cyan-100/90">
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-4" onchange="saveDailyScheduleState(4)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">9:00–11:00: Main technical focus of the day</span></label>
                                </div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-2 border-b border-blue-900/50 pb-2">
                                <div class="w-24 text-sky-400 font-bold text-xs uppercase tracking-wider">Break</div>
                                <div class="flex-1 text-sm text-cyan-100/90">
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-5" onchange="saveDailyScheduleState(5)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">11:00–11:30: Walk, Stretch, Hydrate</span></label>
                                </div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-2 border-b border-blue-900/50 pb-2">
                                <div class="w-24 text-sky-400 font-bold text-xs uppercase tracking-wider">Deep Work 2</div>
                                <div class="flex-1 text-sm text-cyan-100/90">
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-6" onchange="saveDailyScheduleState(6)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">11:30–1:00: Project building</span></label>
                                </div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-2 border-b border-blue-900/50 pb-2">
                                <div class="w-24 text-sky-400 font-bold text-xs uppercase tracking-wider">Afternoon</div>
                                <div class="flex-1 text-sm text-cyan-100/90">
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-7" onchange="saveDailyScheduleState(7)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">2:00–3:30: Language learning, Portfolio work, Documentation</span></label>
                                </div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-2">
                                <div class="w-24 text-sky-400 font-bold text-xs uppercase tracking-wider">Evening</div>
                                <div class="flex-1 text-sm text-cyan-100/90 space-y-2">
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-8" onchange="saveDailyScheduleState(8)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">6:00–7:00: Family/Loved Ones</span></label>
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-9" onchange="saveDailyScheduleState(9)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">7:00–8:00: Drawing / Creativity / Relaxation</span></label>
                                    <label class="flex items-start gap-3"><input type="checkbox" id="daily-item-10" onchange="saveDailyScheduleState(10)" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4"><span class="block">8:00–8:15: Journal</span></label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card rounded-3xl p-6 shadow-xl border border-teal-500/10">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
                            <div>
                                <div class="text-xs uppercase tracking-widest text-teal-400 font-bold">Daily Schedule Progress</div>
                                <div class="text-2xl font-black text-white" id="dailyScheduleProgressText">0%</div>
                                <div id="dailyScheduleProgressStatus" class="text-sm text-cyan-100/80 mt-1">Complete your schedule items for today.</div>
                            </div>
                            <div class="relative w-20 h-20 flex items-center justify-center">
                                <svg class="w-full h-full transform -rotate-90">
                                    <circle cx="32" cy="32" r="28" stroke="rgba(45,212,191,0.05)" stroke-width="6" fill="transparent"/>
                                    <circle id="dailyScheduleProgressCircle" cx="32" cy="32" r="28" stroke="#34d399" stroke-width="6" fill="transparent"
                                            stroke-dasharray="175" stroke-dashoffset="175" class="transition-all duration-500 ease-out"/>
                                </svg>
                                <span id="dailyScheduleProgressNumber" class="absolute text-sm font-black text-emerald-300">0%</span>
                            </div>
                        </div>
                        <div class="flex justify-end">
                            <button type="button" onclick="resetDailyScheduleChecklist()" class="text-xs text-teal-300 hover:text-teal-100">Clear today</button>
                        </div>
                    </div>
                    <div class="glass-card rounded-3xl p-6 shadow-xl border border-teal-500/10">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="text-lg font-bold text-cyan-200">Daily Schedule Checklist</h4>
                        </div>
                        <div id="dailyScheduleArea" class="space-y-3"></div>
                    </div>
                `
            }
        };

        const weekDays = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

        const weekChecklistDefaults = {
            week1: [
                'Set up project scaffold',
                'Build the homepage section',
                'Style with Tailwind',
                'Add interactivity and controls',
                'Publish on Vercel',
                'Review your week',
                'Plan next week'
            ],
            week2: [
                'Design backend routes',
                'Build API endpoints',
                'Connect to database',
                'Test data flows',
                'Deploy backend',
                'Reflect on learnings',
                'Prepare next milestones'
            ],
            week3: [
                'Add authentication',
                'Create protected routes',
                'Connect frontend + backend',
                'Polish user experience',
                'Test end-to-end',
                'Review your app',
                'Plan final polish'
            ],
            week4: [
                'Build portfolio pages',
                'Polish UI and copy',
                'Add demo screenshots',
                'Write project summary',
                'Deploy portfolio',
                'Share with others',
                'Reflect and celebrate'
            ]
        };

        function renderWeekChecklist(weekKey) {
            const checklistContainer = document.getElementById('weekChecklistArea');
            if (!checklistContainer) return;

            const defaults = weekChecklistDefaults[weekKey] || weekChecklistDefaults.week1;
            checklistContainer.innerHTML = weekDays.map((day, index) => {
                const defaultText = defaults[index] || `Plan ${day}`;
                const safeText = defaultText.replace(/"/g, '&quot;');
                return `
                    <label class="grid grid-cols-[auto_1fr] gap-3 items-start p-3 rounded-2xl bg-blue-950/30 border border-blue-500/20">
                        <input type="checkbox" id="${weekKey}-day-${index}" onchange="saveWeekDayState('${weekKey}', ${index})" class="glow-aqua mt-1 rounded-md border-cyan-800 bg-blue-950 text-teal-500 h-4 w-4">
                        <div class="space-y-2">
                            <div class="flex items-center justify-between gap-3">
                                <span class="text-sm font-bold text-cyan-100">${day}</span>
                                <button type="button" onclick="resetWeekChecklistDay('${weekKey}', ${index})" class="text-[10px] uppercase tracking-widest text-teal-300 hover:text-teal-100">Reset</button>
                            </div>
                            <input type="text" id="${weekKey}-task-${index}" class="w-full bg-blue-950/50 border border-blue-500/20 rounded-xl px-3 py-2 text-sm text-cyan-100 focus:outline-none focus:border-teal-400" placeholder="${safeText}" onchange="saveWeekDayState('${weekKey}', ${index})">
                        </div>
                    </label>
                `;
            }).join('');

            weekDays.forEach((_, index) => loadWeekChecklistState(weekKey, index));
        }

        function saveWeekDayState(weekKey, index) {
            const checkbox = document.getElementById(`${weekKey}-day-${index}`);
            const taskInput = document.getElementById(`${weekKey}-task-${index}`);
            if (!checkbox || !taskInput) return;
            localStorage.setItem(`${weekKey}_day_${index}_checked`, checkbox.checked);
            localStorage.setItem(`${weekKey}_day_${index}_text`, taskInput.value.trim());
            updateAllProgress();
        }

        function loadWeekChecklistState(weekKey, index) {
            const checkbox = document.getElementById(`${weekKey}-day-${index}`);
            const taskInput = document.getElementById(`${weekKey}-task-${index}`);
            if (!checkbox || !taskInput) return;
            const checked = localStorage.getItem(`${weekKey}_day_${index}_checked`);
            const text = localStorage.getItem(`${weekKey}_day_${index}_text`);
            if (checked !== null) checkbox.checked = checked === 'true';
            if (text !== null) taskInput.value = text;
        }

        function resetWeekChecklistDay(weekKey, index) {
            const checkbox = document.getElementById(`${weekKey}-day-${index}`);
            const taskInput = document.getElementById(`${weekKey}-task-${index}`);
            if (!checkbox || !taskInput) return;
            checkbox.checked = false;
            taskInput.value = '';
            localStorage.removeItem(`${weekKey}_day_${index}_checked`);
            localStorage.removeItem(`${weekKey}_day_${index}_text`);
        }

        function resetWeekChecklist(weekKey) {
            weekDays.forEach((_, index) => resetWeekChecklistDay(weekKey, index));
            updateAllProgress();
        }

        const dailyScheduleCount = 11;

        function saveDailyScheduleState(index) {
            const checkbox = document.getElementById(`daily-item-${index}`);
            if (!checkbox) return;
            localStorage.setItem(`daily_schedule_item_${index}_checked`, checkbox.checked);
            updateAllProgress();
        }

        function loadDailyScheduleState(index) {
            const checkbox = document.getElementById(`daily-item-${index}`);
            if (!checkbox) return;
            const checked = localStorage.getItem(`daily_schedule_item_${index}_checked`);
            if (checked !== null) checkbox.checked = checked === 'true';
        }

        function renderDailyScheduleState() {
            for (let i = 0; i < dailyScheduleCount; i++) {
                loadDailyScheduleState(i);
            }
        }

        function resetDailyScheduleChecklist() {
            for (let i = 0; i < dailyScheduleCount; i++) {
                const checkbox = document.getElementById(`daily-item-${i}`);
                if (!checkbox) continue;
                checkbox.checked = false;
                localStorage.removeItem(`daily_schedule_item_${i}_checked`);
            }
            updateAllProgress();
        }

        function setProgressCircle(circleId, textId, percent) {
            const circle = document.getElementById(circleId);
            const text = document.getElementById(textId);
            if (!circle || !text) return;
            const total = 2 * Math.PI * 28;
            const offset = total - (percent / 100) * total;
            circle.style.strokeDashoffset = offset;
            text.innerText = `${percent}%`;
        }

        function updateNonNegotiablesProgress() {
            const checkboxes = Array.from(document.querySelectorAll('#nonNegotiablesList input[type="checkbox"]'));
            const checkedCount = checkboxes.filter(cb => cb.checked).length;
            const percentage = checkboxes.length > 0 ? Math.round((checkedCount / checkboxes.length) * 100) : 0;
            setProgressCircle('progressCircle', 'progressText', percentage);
            const status = document.getElementById('progressStatus');
            if (status) status.innerText = percentage === 100 ? 'All done — keep the streak!' : 'Let\'s create momentum! 💧';
        }

        function updateDailyScheduleProgress() {
            let checkedCount = 0;
            for (let i = 0; i < dailyScheduleCount; i++) {
                const checkbox = document.getElementById(`daily-item-${i}`);
                if (checkbox && checkbox.checked) checkedCount += 1;
            }
            const percentage = dailyScheduleCount > 0 ? Math.round((checkedCount / dailyScheduleCount) * 100) : 0;
            setProgressCircle('dailyScheduleProgressCircle', 'dailyScheduleProgressNumber', percentage);
            const text = document.getElementById('dailyScheduleProgressText');
            const status = document.getElementById('dailyScheduleProgressStatus');
            if (text) text.innerText = `${percentage}%`;
            if (status) status.innerText = percentage === 100 ? 'All schedule items complete today!' : 'Complete today\'s schedule.';
        }

        function updateWeeklyProgress(weekKey) {
            const checkboxes = Array.from(document.querySelectorAll(`#weekChecklistArea input[type="checkbox"]`));
            const checkedCount = checkboxes.filter(cb => cb.checked).length;
            const percentage = checkboxes.length > 0 ? Math.round((checkedCount / checkboxes.length) * 100) : 0;
            setProgressCircle('weeklyProgressCircle', 'weeklyProgressText', percentage);
            const status = document.getElementById('weeklyProgressStatus');
            if (status) status.innerText = percentage === 100 ? 'Weekly goals are complete!' : `Weekly goal progress — ${checkedCount}/${checkboxes.length}`;
        }

        function updateMonthlyProgress() {
            const habitCheckboxes = Array.from(document.querySelectorAll('#nonNegotiablesList input[type="checkbox"]'));
            const habitChecked = habitCheckboxes.filter(cb => cb.checked).length;
            const habitTotal = habitCheckboxes.length;

            let dailyChecked = 0;
            for (let i = 0; i < dailyScheduleCount; i++) {
                if (localStorage.getItem(`daily_schedule_item_${i}_checked`) === 'true') dailyChecked += 1;
            }
            const dailyTotal = dailyScheduleCount;

            let weeklyChecked = 0;
            let weeklyTotal = 0;
            Object.keys(weekChecklistDefaults).forEach(weekKey => {
                weekChecklistDefaults[weekKey].forEach((_, index) => {
                    weeklyTotal += 1;
                    if (localStorage.getItem(`${weekKey}_day_${index}_checked`) === 'true') weeklyChecked += 1;
                });
            });

            const total = habitTotal + dailyTotal + weeklyTotal;
            const checkedCount = habitChecked + dailyChecked + weeklyChecked;
            const percentage = total > 0 ? Math.round((checkedCount / total) * 100) : 0;
            setProgressCircle('monthlyProgressCircle', 'monthlyProgressText', percentage);
            const status = document.getElementById('monthlyProgressStatus');
            if (status) status.innerText = percentage === 100 ? 'Month complete — incredible!' : 'Monthly progress from all checklists.';
        }

        function updateAllProgress() {
            updateNonNegotiablesProgress();
            updateDailyScheduleProgress();
            if (currentTabKey.startsWith('week')) updateWeeklyProgress(currentTabKey);
            updateMonthlyProgress();
        }

        let currentTabKey = 'week1';

        function switchTab(tabKey) {
            currentTabKey = tabKey;
            document.querySelectorAll('.day-tab').forEach(tab => {
                tab.classList.remove('bg-gradient-to-r', 'from-teal-500', 'to-cyan-500', 'text-white', 'shadow-lg');
                tab.classList.add('text-cyan-300/60', 'hover:text-cyan-200');
            });
            const selectedTab = document.getElementById(`tab-${tabKey}`);
            selectedTab.classList.add('bg-gradient-to-r', 'from-teal-500', 'to-cyan-500', 'text-white', 'shadow-lg');

            const targetData = scheduleData[tabKey];
            document.getElementById('currentTabSubtitle').innerText = targetData.subtitle;
            document.getElementById('currentTabTitle').innerText = targetData.title;
            document.getElementById('tabContentArea').innerHTML = targetData.content;
            renderWeekChecklist(tabKey);
            if (tabKey === 'daily') renderDailyScheduleState();
            updateAllProgress();
        }

        function updateProgress() {
            saveCheckedState();
            updateAllProgress();
        }

        function saveCheckedState() {
            const today = new Date().toLocaleDateString();
            document.querySelectorAll('#nonNegotiablesList input[type="checkbox"]').forEach(box => {
                if(box.id) localStorage.setItem(`sprint_${today}_${box.id}`, box.checked);
            });
        }

        function loadCheckedState() {
            const today = new Date().toLocaleDateString();
            document.querySelectorAll('#nonNegotiablesList input[type="checkbox"]').forEach(box => {
                if(box.id && localStorage.getItem(`sprint_${today}_${box.id}`) !== null) {
                    box.checked = localStorage.getItem(`sprint_${today}_${box.id}`) === 'true';
                }
            });
            updateProgress();
        }

        // Local Storage Logging
        function saveLogToCloud() {
            const textInput = document.getElementById('progressLogInput');
            const dataText = textInput.value.trim();
            if(!dataText) return;

            const timestamp = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const localFallback = JSON.parse(localStorage.getItem('sprint_logs') || '[]');
            localFallback.unshift({ time: timestamp, content: dataText });
            localStorage.setItem('sprint_logs', JSON.stringify(localFallback));

            textInput.value = '';
            fetchLogs();
        }

        function fetchLogs() {
            const nodeFeed = document.getElementById('logFeed');
            const localFallback = JSON.parse(localStorage.getItem('sprint_logs') || '[]');
            
            if(localFallback.length === 0) {
                nodeFeed.innerHTML = `<p class="text-xs text-cyan-400/30 italic text-center py-4">No logs yet. Start executing!</p>`;
                return;
            }
            nodeFeed.innerHTML = localFallback.map(log => `
                <div class="p-2.5 rounded-xl bg-blue-950/40 border border-blue-900/30 text-xs animation-fade-in">
                    <span class="text-[10px] font-bold text-teal-400 block mb-0.5">${log.time}</span>
                    <p class="text-cyan-100/80 leading-relaxed">${log.content}</p>
                </div>
            `).join('');
        }

        window.onload = () => {
            function updateLiveTime() {
                const today = new Date();
                const dateOptions = { weekday: 'long', month: 'long', day: 'numeric' };
                const formattedDate = today.toLocaleDateString('en-US', dateOptions);
                const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                const formattedTime = today.toLocaleTimeString('en-US', timeOptions);
                document.getElementById('liveDateDisplay').innerText = `💧 Today is ${formattedDate} — ${formattedTime}`;
            }

            updateLiveTime();
            setInterval(updateLiveTime, 1000);

            switchTab('week1');
            loadCheckedState();
            updateAllProgress();
            fetchLogs();
        };
    </script>
</body>
</html>
